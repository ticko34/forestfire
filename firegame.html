<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소방 헬기 작전 - 웹 브라우저 통합판</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #142314;
            display: block;
        }
        /* 웹캠 영상은 백그라운드에서 연산용으로만 쓰고 화면엔 숨김 */
        #webcam {
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<video id="webcam" autoplay playsinline></video>

<script>
// --- 1. 기본 게임 설정 및 변수 ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const videoElement = document.getElementById("webcam");

const SCREEN_WIDTH = 800;
const SCREEN_HEIGHT = 600;

let gameState = "MENU"; // MENU, GAME, GAMEOVER
let controlMode = null; // KEYBOARD, AI

const SCROLL_SPEED = 5;
const CHOPPER_SPEED = 8;

let chopperX = SCREEN_WIDTH / 2;
let chopperY = SCREEN_HEIGHT - 200;
const chopperWidth = 80;
const chopperHeight = 50;

let waterParticles = [];
let shootCooldown = 0;

// 시스템 변수
const MAX_TIME = 60.0;
let timeLeft = MAX_TIME;

const MAX_WATER = 100.0;
let currentWater = MAX_WATER;
const WATER_DRAIN = 3.5;
const WATER_RECHARGE = 0.4;
let isRecharging = false;

let score = 0;
let keys = {};
let isShooting = false;

// 오브젝트 리스트
let burningTrees = [];
let citizens = [];
let normalTrees = [];

// 유틸리티: 랜덤 범위 함수
function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}

// 🔄 게임 리셋 함수
function resetGame() {
    timeLeft = MAX_TIME;
    currentWater = MAX_WATER;
    isRecharging = false;
    score = 0;
    waterParticles = [];
    chopperX = SCREEN_WIDTH / 2;
    chopperY = SCREEN_HEIGHT - 200;
    // [x, y, 상태] 구조로 변경 (초기 상태는 모두 "BURNING")
    burningTrees = Array.from({length: 5}, () => [randomRange(50, SCREEN_WIDTH - 50), randomRange(-300, 0), "BURNING"]);
    citizens = Array.from({length: 2}, () => [randomRange(50, SCREEN_WIDTH - 50), randomRange(-500, -100), "ALIVE"]);
    normalTrees = Array.from({length: 15}, () => [randomRange(20, SCREEN_WIDTH - 20), randomRange(-200, SCREEN_HEIGHT), "NORMAL"]);
}

// --- 2. 키보드 입력 핸들러 ---
window.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    
    // 브라우저 스크롤 방지
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
        e.preventDefault();
    }

    // 메뉴 상태에서 선택
    if (gameState === "MENU") {
        if (e.key === "1") {
            controlMode = "KEYBOARD";
            resetGame();
            gameState = "GAME";
        } else if (e.key === "2") {
            controlMode = "AI";
            resetGame();
            gameState = "GAME";
            initMediaPipe(); // AI 모드일 때 카메라 가동
        }
    }
    // 게임오버 상태에서 재시작
    if (gameState === "GAMEOVER" && (e.key === "r" || e.key === "R")) {
        gameState = "MENU";
    }
});

window.addEventListener("keyup", (e) => {
    keys[e.code] = false;
});


// --- 3. AI 손가락 인식 (MediaPipe) 설정 ---
let hands = null;
let camera = null;
let aiIsShooting = false;

function initMediaPipe() {
    if (hands !== null) return; // 이미 초기화됐다면 패스

    hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onHandResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            if (controlMode === "AI" && gameState === "GAME") {
                await hands.send({ image: videoElement });
            }
        },
        width: 640,
        height: 480
    });
    camera.start();
}

function onHandResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        aiIsShooting = false;
        return;
    }

    const landmarks = results.multiHandLandmarks[0];
    
    // 8번 검지 끝, 4번 엄지 끝 (웹캠 미러링 반영을 위해 X축 반전: 1 - x)
    const ix = (1 - landmarks[8].x) * SCREEN_WIDTH;
    const iy = landmarks[8].y * SCREEN_HEIGHT;
    const tx = (1 - landmarks[4].x) * SCREEN_WIDTH;
    const ty = landmarks[4].y * SCREEN_HEIGHT;

    // 헬기 위치를 검지 손가락 끝으로 추적
    chopperX = Math.max(0, Math.min(SCREEN_WIDTH - chopperWidth, ix - chopperWidth / 2));
    chopperY = Math.max(100, Math.min(SCREEN_HEIGHT - chopperHeight, iy - chopperHeight / 2));

    // 엄지와 검지 거리 계산 (발사 조건)
    const distance = Math.sqrt(Math.pow(ix - tx, 2) + Math.pow(iy - ty, 2));
    if (distance < 50) {
        aiIsShooting = true;
    } else {
        aiIsShooting = false;
    }
}


// --- 4. 게임 핵심 루프 (30 FPS 고정) ---
function updateAndRender() {
    // ------------------ 1) 메뉴 화면 ------------------
    if (gameState === "MENU") {
        ctx.fillStyle = "#1e1e28";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 40px 'Malgun Gothic'";
        ctx.textAlign = "center";
        ctx.fillText("🚁 소방 헬기 시뮬레이터 (웹 판)", SCREEN_WIDTH / 2, 180);

        ctx.fillStyle = "#cccccc";
        ctx.font = "24px 'Malgun Gothic'";
        ctx.fillText("조작 방식을 선택하면 게임이 시작됩니다", SCREEN_WIDTH / 2, 250);

        ctx.fillStyle = "#64c8ff";
        ctx.fillText("[ 숫자 1 ] 키보드 화살표 모드 (발사: 스페이스바)", SCREEN_WIDTH / 2, 350);
        ctx.fillStyle = "#ffc864";
        ctx.fillText("[ 숫자 2 ] AI 손가락 인식 모드 (발사: 엄지-검지 접기)", SCREEN_WIDTH / 2, 420);
    }

    // ------------------ 2) 게임 진행 화면 ------------------
    else if (gameState === "GAME") {
        // 배경 채우기
        ctx.fillStyle = "#142314";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        // ⏱️ 타이머 및 물 게이지 시스템 계산
        timeLeft -= 1 / 30;
        if (timeLeft <= 0) {
            timeLeft = 0;
            gameState = "GAMEOVER";
        }

        if (isRecharging) {
            currentWater += WATER_RECHARGE * 1.5;
            if (currentWater >= MAX_WATER) {
                currentWater = MAX_WATER;
                isRecharging = false;
            }
        } else if (currentWater < MAX_WATER) {
            currentWater += WATER_RECHARGE;
        }

        // --- 조작 및 입력 세팅 ---
        isShooting = false;

        if (controlMode === "KEYBOARD") {
            if (keys["ArrowLeft"])  { chopperX -= CHOPPER_SPEED; }
            if (keys["ArrowRight"]) { chopperX += CHOPPER_SPEED; }
            if (keys["ArrowUp"])    { chopperY -= CHOPPER_SPEED; }
            if (keys["ArrowDown"])  { chopperY += CHOPPER_SPEED; }
            if (keys["Space"])      isShooting = true;

            chopperX = Math.max(0, Math.min(SCREEN_WIDTH - chopperWidth, chopperX));
            chopperY = Math.max(100, Math.min(SCREEN_HEIGHT - chopperHeight, chopperY));
        } else if (controlMode === "AI") {
            isShooting = aiIsShooting;
            
            // 📷 우측 상단 미니 캠 그리기 (미러링 좌표 수정 완료)
            ctx.save();
            ctx.translate(SCREEN_WIDTH - 10, 10); // 우측 상단 여백 (790, 10)으로 기준점 이동
            ctx.scale(-1, 1);                     // 좌우 반전
            ctx.drawImage(videoElement, 0, 0, 160, 120); // 기준점 기준 왼쪽으로 160만큼 알아서 채워짐
            ctx.restore();

            // 미니캠 흰색 테두리 선
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.strokeRect(SCREEN_WIDTH - 170, 10, 160, 120);
        }

        // 🛠️ 물포탄 분사 제어 (관성 제거 버전)
        if (isShooting && currentWater > 0 && !isRecharging) { 
            
            currentWater -= 1.2; 
            if (currentWater <= 0) {
                currentWater = 0;
                isRecharging = true; 
            }

            const WATER_VOLLEY = 6; 

            for (let i = 0; i < WATER_VOLLEY; i++) {
                // 💡 [수정] 헬기의 속도변수를 더하지 않고 0을 기준으로만 살짝 퍼지게 고정!
                let scatterVx = (Math.random() * 4 - 2);  // 좌우로만 살짝 흩뿌려짐 (대각선 휨 방지)
                let scatterVy = (Math.random() * 2 - 1);  
                
                let offsetX = (Math.random() * 50 - 25); 
                let randomZ = 40 + (Math.random() * 12);
                let randomSize = randomRange(6, 11); 

                waterParticles.push([
                    chopperX + chopperWidth / 2 + offsetX, 
                    chopperY + chopperHeight, 
                    scatterVx, 
                    scatterVy, 
                    randomZ, 
                    randomSize, 
                    0 
                ]);
            }
        }

        // --- 🌲 배경용 일반 나무 그리기 ---
        normalTrees.forEach(tree => {
            tree[1] += SCROLL_SPEED;
            
            let tX = tree[0];
            let tY = tree[1];

            // 1) 입체감을 주는 반투명 바닥 그림자
            ctx.fillStyle = "rgba(10, 25, 10, 0.35)";
            ctx.beginPath(); ctx.arc(tX + 12, tY + 16, 22, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 4, tY + 22, 16, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 20, tY + 12, 14, 0, Math.PI * 2); ctx.fill();

            // 2) 가장 어두운 베이스 잎 레이어
            ctx.fillStyle = "#1B5E20"; 
            ctx.beginPath(); ctx.arc(tX, tY, 22, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX - 8, tY + 6, 16, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 8, tY - 4, 14, 0, Math.PI * 2); ctx.fill();

            // 3) 중간 밝은 잎 레이어
            ctx.fillStyle = "#2E7D32"; 
            ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 19, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX - 10, tY + 3, 13, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 5, tY - 6, 12, 0, Math.PI * 2); ctx.fill();

            // 4) 빛을 받는 좌측 상단 하이라이트 레이어
            ctx.fillStyle = "#4CAF50"; 
            ctx.beginPath(); ctx.arc(tX - 5, tY - 5, 12, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX - 12, tY - 1, 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 2, tY - 9, 7, 0, Math.PI * 2); ctx.fill();

            if (tree[1] > SCREEN_HEIGHT + 40) {
                tree[0] = randomRange(20, SCREEN_WIDTH - 20);
                tree[1] = randomRange(-100, -40);
            }
        });

        // --- 🌊 물포탄 업데이트 및 그리기 ---
        for (let i = waterParticles.length - 1; i >= 0; i--) {
            let p = waterParticles[i];
            if (p[6] === 0) { // 1) 공중 낙하
                p[0] += p[2];
                p[1] += p[3] + SCROLL_SPEED;
                p[4] -= 4;

                let currentSize = p[5] * (1.0 + p[4] / 40.0);
                ctx.beginPath();
                ctx.fillStyle = "#00BFFF";
                ctx.arc(p[0], p[1], currentSize, 0, Math.PI * 2);
                ctx.fill();

                if (p[4] <= 0) {
                    p[6] = 1; // 바닥 안착
                    p[5] = randomRange(12, 16); 
                }
            } else if (p[6] === 1) { // 2) 지면 스플래시
                p[1] += SCROLL_SPEED;
                p[5] -= 1.8; 
                if (p[5] <= 0 || p[1] > SCREEN_HEIGHT) {
                    waterParticles.splice(i, 1);
                    continue;
                }
                ctx.beginPath();
                ctx.strokeStyle = "#1E90FF";
                ctx.lineWidth = 3.5; 
                ctx.arc(p[0], p[1], p[5], 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- 🔥 불타는 나무 업데이트 ---
        burningTrees.forEach(tree => {
            tree[1] += SCROLL_SPEED;

            let tX = tree[0];
            let tY = tree[1];
            let tState = tree[2]; 

            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.beginPath(); ctx.arc(tX + 10, tY + 14, 20, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#1A1A1A"; 
            ctx.beginPath(); ctx.arc(tX, tY, 20, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX - 6, tY + 4, 14, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(tX + 6, tY - 4, 12, 0, Math.PI * 2); ctx.fill();

            if (tState === "EXTINGUISHED") {
                ctx.fillStyle = "rgba(100, 100, 100, 0.6)"; 
                ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(tX + 4, tY + 2, 8, 0, Math.PI * 2); ctx.fill();
            }

            if (tState === "BURNING") {
                let pulse1 = Math.sin(Date.now() / 90) * 3;
                let pulse2 = Math.cos(Date.now() / 70) * 2;

                ctx.fillStyle = "#FF3D00";
                ctx.beginPath(); ctx.arc(tX + pulse1, tY + pulse2, 19 + pulse1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(tX - 7 + pulse2, tY - 3, 13 + pulse2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(tX + 5, tY + 5 + pulse1, 11 - pulse1, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = "#FF9100";
                ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 13 + pulse2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(tX - 9, tY + 1, 8 + pulse1, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = "#FFEA00";
                ctx.beginPath(); ctx.arc(tX - 4, tY - 4, 7 + pulse1, 0, Math.PI * 2); ctx.fill();
            }

            waterParticles.forEach(p => {
                if (p[6] === 1 && tState === "BURNING") {
                    let dist = Math.sqrt(Math.pow(tX - p[0], 2) + Math.pow(tY - p[1], 2));
                    if (dist < (20 + p[5])) {
                        score += 10;
                        tree[2] = "EXTINGUISHED"; 
                    }
                }
            });

            if (tree[1] > SCREEN_HEIGHT + 30) {
                tree[0] = randomRange(50, SCREEN_WIDTH - 50);
                tree[1] = randomRange(-200, -50);
                tree[2] = "BURNING"; 
            }
        });

        // --- 🧍 시민 업데이트 ---
        citizens.forEach(person => {
            person[1] += SCROLL_SPEED;

            ctx.beginPath();
            ctx.fillStyle = "#FFE0BD";
            ctx.arc(person[0], person[1], 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#FFFF00";
            ctx.fillRect(person[0] - 8, person[1] + 10, 16, 15);

            let distChopper = Math.sqrt(Math.pow((chopperX + chopperWidth / 2) - person[0], 2) + Math.pow((chopperY + chopperHeight / 2) - person[1], 2));
            if (distChopper < 40) {
                score += 50;
                person[0] = randomRange(50, SCREEN_WIDTH - 50);
                person[1] = randomRange(-300, -100);
            }

            for (let i = waterParticles.length - 1; i >= 0; i--) {
                let p = waterParticles[i];
                if (p[6] === 1) {
                    let distP = Math.sqrt(Math.pow(p[0] - person[0], 2) + Math.pow(p[1] - person[1], 2));
                    if (distP < (15 + p[5])) {
                        score -= 20;
                        waterParticles.splice(i, 1);
                        break;
                    }
                }
            }

            if (person[1] > SCREEN_HEIGHT + 30) {
                person[0] = randomRange(50, SCREEN_WIDTH - 50);
                person[1] = randomRange(-300, -100);
            }
        });

        // --- 🚁 플레이어 헬기 그리기 ---
        let cX = chopperX + chopperWidth / 2;
        let cY = chopperY + chopperHeight / 2;

        ctx.beginPath();
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.ellipse(cX + 20, cY + 30, 18, 28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(cX + 16, cY + 55, 8, 35);
        ctx.fillRect(cX + 6, cY + 85, 20, 5);

        ctx.fillStyle = "#D32F2F"; 
        ctx.fillRect(cX - 4, cY, 8, 55);
        ctx.fillRect(cX - 12, cY + 50, 24, 6);

        ctx.fillStyle = "#FFFFFF"; 
        ctx.fillRect(cX - 30, cY - 8, 8, 24);
        ctx.fillRect(cX + 22, cY - 8, 8, 24);
        ctx.fillStyle = "#757575";
        ctx.fillRect(cX - 22, cY, 44, 4);

        ctx.beginPath();
        ctx.fillStyle = "#FF1744"; 
        ctx.ellipse(cX, cY, 20, 30, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = "rgba(128, 222, 234, 0.85)"; 
        ctx.ellipse(cX, cY - 14, 13, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.ellipse(cX - 4, cY - 16, 4, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(cX, cY - 5); 
        let rotorAngle = (Date.now() / 40) % (Math.PI * 2);
        ctx.rotate(rotorAngle);
        ctx.strokeStyle = "rgba(230, 230, 230, 0.75)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-55, 0); ctx.lineTo(55, 0);
        ctx.moveTo(0, -55); ctx.lineTo(0, 55);
        ctx.stroke();
        ctx.beginPath();
        ctx.fillStyle = "#37474F";
        ctx.arc(0, 0, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- 📊 UI 그리기 ---
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px 'Malgun Gothic'";
        ctx.textAlign = "left";
        ctx.fillText(`작전 점수: ${score}점 | 모드: ${controlMode}`, 20, 35);
        
        ctx.fillStyle = timeLeft > 10 ? "#ffff64" : "#ff3232";
        ctx.fillText(`남은 시간: ${Math.max(0, Math.floor(timeLeft))}초`, 20, 65);

        let gX = 20, gY = 540, gW = 200, gH = 25;
        ctx.fillStyle = "#3c3c3c";
        ctx.fillRect(gX, gY, gW, gH);

        let fillW = gW * (currentWater / MAX_WATER);
        ctx.fillStyle = isRecharging ? "#ff3232" : "#00BFFF";
        ctx.fillRect(gX, gY, fillW, gH);
        
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(gX, gY, gW, gH);

        ctx.fillStyle = "#ffffff";
        ctx.fillText(isRecharging ? "경고: 물 재충전 중!!" : `물 탱크: ${Math.floor(currentWater)}%`, gX + 5, gY - 10);
    }

    // ------------------ 3) 게임 오버 화면 ------------------
    else if (gameState === "GAMEOVER") {
        ctx.fillStyle = "#281414";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        ctx.fillStyle = "#ff6464";
        ctx.font = "bold 40px 'Malgun Gothic'";
        ctx.textAlign = "center";
        ctx.fillText("🚨 작전 종료 (GAME OVER) 🚨", SCREEN_WIDTH / 2, 220);

        ctx.fillStyle = "#ffffff";
        ctx.font = "28px 'Malgun Gothic'";
        ctx.fillText(`최종 소방 작전 점수: ${score} 점`, SCREEN_WIDTH / 2, 300);

        ctx.fillStyle = "#cccccc";
        ctx.font = "20px 'Malgun Gothic'";
        ctx.fillText("메뉴로 돌아가려면 키보드 [ R ] 키를 누르세요.", SCREEN_WIDTH / 2, 380);
    }
}

// ⏱️ 30 FPS 고정 타이머 실행 루프
let fps = 30;
let now;
let then = Date.now();
let interval = 1000 / fps;
let delta;

function gameLoop() {
    requestAnimationFrame(gameLoop);
    now = Date.now();
    delta = now - then;
    if (delta > interval) {
        then = now - (delta % interval);
        updateAndRender();
    }
}

gameLoop();
</script>
