<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소방 헬기 작전 - 상황실 통합판</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* 📦 게임과 사이드바를 가로로 배치하는 컨테이너 */
        #game-container {
            display: flex;
            background-color: #1e1e28;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* 🎮 왼쪽: 게임 화면 */
        canvas {
            background-color: #142314;
            display: block;
        }

        /* 📊 오른쪽: 작전 상황실 (사이드바) */
        #sidebar {
            width: 280px;
            background-color: #1a1a24;
            border-left: 3px solid #2d2d3f;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            text-align: center;
            color: #64c8ff;
            border-bottom: 2px solid #2d2d3f;
            padding-bottom: 10px;
        }

        /* 📷 카메라 박스 (AI 모드 전용) */
        .camera-box {
            width: 100%;
            height: 180px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 2px solid #3a3a50;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .camera-box::before {
            content: "AI 모드 시 카메라 활성화";
            position: absolute;
            color: #555;
            font-size: 14px;
            z-index: 1;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 💡 CSS로 깔끔하게 좌우 반전(미러링) 처리 */
            position: relative;
            z-index: 2;
        }

        /* 📈 스탯 표시 스타일 */
        .stat-card {
            background-color: #252535;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #323246;
        }

        .stat-label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }

        /* 🌊 물탱크 게이지 커스텀 */
        .water-progress-bg {
            width: 100%;
            height: 18px;
            background-color: #333;
            border-radius: 9px;
            overflow: hidden;
            margin-top: 5px;
            border: 1px solid #444;
        }

        #water-progress-fill {
            width: 100%;
            height: 100%;
            background-color: #00BFFF;
            transition: width 0.05s linear;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="sidebar">
        <h2>🚁 작전 상황실</h2>
        
        <div class="camera-box">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div class="stat-card">
            <div class="stat-label">현재 조작 모드</div>
            <div id="ui-mode" class="stat-value" style="color: #ffc864;">대기 중</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">현재 획득 점수</div>
            <div id="ui-score" class="stat-value" style="color: #5cf55c;">0 점</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">남은 작전 시간</div>
            <div id="ui-time" class="stat-value" style="color: #ffff64;">60 초</div>
        </div>

        <div class="stat-card">
            <div class="stat-label" id="ui-water-label">물 탱크 용량 (100%)</div>
            <div class="water-progress-bg">
                <div id="water-progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<script>
// --- 1. 기본 게임 설정 및 변수 ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const videoElement = document.getElementById("webcam");

// 사이드바 UI 요소들 수집
const uiMode = document.getElementById("ui-mode");
const uiScore = document.getElementById("ui-score");
const uiTime = document.getElementById("ui-time");
const uiWaterLabel = document.getElementById("ui-water-label");
const uiWaterFill = document.getElementById("water-progress-fill");

const SCREEN_WIDTH = 800;
const SCREEN_HEIGHT = 600;

let gameState = "MENU"; 
let controlMode = null; 

const SCROLL_SPEED = 5;
const CHOPPER_SPEED = 12;

let chopperX = SCREEN_WIDTH / 2;
let chopperY = SCREEN_HEIGHT - 200;
const chopperWidth = 80;
const chopperHeight = 50;

let waterParticles = [];
let shootCooldown = 0;

const MAX_TIME = 60.0;
let timeLeft = MAX_TIME;

const MAX_WATER = 100.0;
let currentWater = MAX_WATER;
const WATER_DRAIN = 7;
const WATER_RECHARGE = 1;
let isRecharging = false;

let score = 0;
let keys = {};
let isShooting = false;

let burningTrees = [];
let citizens = [];
let normalTrees = [];

function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}

function resetGame() {
    timeLeft = MAX_TIME;
    currentWater = MAX_WATER;
    isRecharging = false;
    score = 0;
    waterParticles = [];
    chopperX = SCREEN_WIDTH / 2;
    chopperY = SCREEN_HEIGHT - 200;
    burningTrees = Array.from({length: 5}, () => [randomRange(50, SCREEN_WIDTH - 50), randomRange(-300, 0), "BURNING"]);
    citizens = Array.from({length: 2}, () => [randomRange(50, SCREEN_WIDTH - 50), randomRange(-500, -100), "ALIVE"]);
    normalTrees = Array.from({length: 15}, () => [randomRange(20, SCREEN_WIDTH - 20), randomRange(-200, SCREEN_HEIGHT), "NORMAL"]);
    
    uiMode.innerText = controlMode === "KEYBOARD" ? "키보드 모드" : "AI 제어 모드";
}

// --- 2. 키보드 입력 핸들러 ---
window.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
        e.preventDefault();
    }

    if (gameState === "MENU") {
        if (e.key === "1") {
            controlMode = "KEYBOARD";
            resetGame();
            gameState = "GAME";
        } else if (e.key === "2") {
            controlMode = "AI";
            resetGame();
            gameState = "GAME";
            initMediaPipe(); 
        }
    }
    if (gameState === "GAMEOVER" && (e.key === "r" || e.key === "R")) {
        gameState = "MENU";
        uiMode.innerText = "대기 중";
        uiScore.innerText = "0 점";
        uiTime.innerText = "60 초";
        uiTime.style.color = "#ffff64";
        uiWaterFill.style.width = "100%";
        uiWaterFill.style.backgroundColor = "#00BFFF";
        uiWaterLabel.innerText = "물 탱크 용량 (100%)";
    }
});

window.addEventListener("keyup", (e) => {
    keys[e.code] = false;
});


// --- 3. AI 손가락 인식 (MediaPipe) 설정 ---
let hands = null;
let camera = null;
let aiIsShooting = false;

function initMediaPipe() {
    if (hands !== null) return; 

    hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(onHandResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            if (controlMode === "AI" && gameState === "GAME") {
                await hands.send({ image: videoElement });
            }
        },
        width: 640,
        height: 480
    });
    camera.start();
}

function onHandResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        aiIsShooting = false;
        return;
    }

    const landmarks = results.multiHandLandmarks[0];
    const ix = (1 - landmarks[8].x) * SCREEN_WIDTH;
    const iy = landmarks[8].y * SCREEN_HEIGHT;
    const tx = (1 - landmarks[4].x) * SCREEN_WIDTH;
    const ty = landmarks[4].y * SCREEN_HEIGHT;

    chopperX = Math.max(0, Math.min(SCREEN_WIDTH - chopperWidth, ix - chopperWidth / 2));
    chopperY = Math.max(100, Math.min(SCREEN_HEIGHT - chopperHeight, iy - chopperHeight / 2));

    const distance = Math.sqrt(Math.pow(ix - tx, 2) + Math.pow(iy - ty, 2));
    if (distance < 50) {
        aiIsShooting = true;
    } else {
        aiIsShooting = false;
    }
}


// --- 4. 게임 핵심 루프 (30 FPS 고정) ---
function updateAndRender() {
    // ------------------ 1) 메뉴 화면 ------------------
    if (gameState === "MENU") {
        ctx.fillStyle = "#1e1e28";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 38px 'Malgun Gothic'";
        ctx.textAlign = "center";
        ctx.fillText("🚁 소방 헬기 시뮬레이터", SCREEN_WIDTH / 2, 200);

        ctx.fillStyle = "#cccccc";
        ctx.font = "20px 'Malgun Gothic'";
        ctx.fillText("조작 방식을 선택하면 게임이 시작됩니다", SCREEN_WIDTH / 2, 270);

        ctx.fillStyle = "#64c8ff";
        ctx.fillText("[ 숫자 1 ] 키보드 모드 (발사: 스페이스바)", SCREEN_WIDTH / 2, 360);
        ctx.fillStyle = "#ffc864";
        ctx.fillText("[ 숫자 2 ] AI 인식 모드 (발사: 엄지-검지 접기)", SCREEN_WIDTH / 2, 430);
    }

    // ------------------ 2) 게임 진행 화면 ------------------
    else if (gameState === "GAME") {
        ctx.fillStyle = "#142314";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        // ⏱️ 타이머 및 물 계산
        timeLeft -= 1 / 30;
        if (timeLeft <= 0) {
            timeLeft = 0;
            gameState = "GAMEOVER";
        }

        if (isRecharging) {
            currentWater += WATER_RECHARGE * 1.5;
            if (currentWater >= MAX_WATER) {
                currentWater = MAX_WATER;
                isRecharging = false;
            }
        } else if (currentWater < MAX_WATER) {
            currentWater += WATER_RECHARGE;
        }

        // --- 실시간 사이드바 DOM UI 연동 업데이트 ---
        uiScore.innerText = `${score} 점`;
        uiTime.innerText = `${Math.max(0, Math.floor(timeLeft))} 초`;
        
        if (timeLeft <= 10) {
            uiTime.style.color = "#ff3232"; // 10초 이하면 빨간색 경고
        } else {
            uiTime.style.color = "#ffff64";
        }

        // 물탱크 바 및 상태 텍스트 갱신
        let waterPct = Math.floor(currentWater);
        uiWaterFill.style.width = `${waterPct}%`;
        if (isRecharging) {
            uiWaterFill.style.backgroundColor = "#ff3232";
            uiWaterLabel.innerText = "경고: 물 재충전 중!!";
            uiWaterLabel.style.color = "#ff3232";
        } else {
            uiWaterFill.style.backgroundColor = "#00BFFF";
            uiWaterLabel.innerText = `물 탱크 용량 (${waterPct}%)`;
            uiWaterLabel.style.color = "#aaa";
        }

        // --- 조작 및 입력 세팅 ---
        isShooting = false;

        if (controlMode === "KEYBOARD") {
            if (keys["ArrowLeft"])  { chopperX -= CHOPPER_SPEED; }
            if (keys["ArrowRight"]) { chopperX += CHOPPER_SPEED; }
            if (keys["ArrowUp"])    { chopperY -= CHOPPER_SPEED; }
            if (keys["ArrowDown"])  { chopperY += CHOPPER_SPEED; }
            if (keys["Space"])      isShooting = true;

            chopperX = Math.max(0, Math.min(SCREEN_WIDTH - chopperWidth, chopperX));
            chopperY = Math.max(100, Math.min(SCREEN_HEIGHT - chopperHeight, chopperY));
        } else if (controlMode === "AI") {
            isShooting = aiIsShooting;
            // 💡 [수정] 이제 캠 화면을 직접 오른쪽 사이드바 HTML에 뿌리므로, Canvas 찌꺼기 렌더링 코드는 완전 삭제함!
        }

        // 🛠️ 물포탄 분사 (직하방 수직 낙하 적용 상태)
        if (isShooting && currentWater > 0 && !isRecharging) { 
            currentWater -= 1.2; 
            if (currentWater <= 0) {
                currentWater = 0;
                isRecharging = true; 
            }

            const WATER_VOLLEY = 6; 
            for (let i = 0; i < WATER_VOLLEY; i++) {
                let scatterVx = (Math.random() * 4 - 2);  
                let scatterVy = (Math.random() * 2 - 1);  
                let offsetX = (Math.random() * 50 - 25); 
                let randomZ = 40 + (Math.random() * 12);
                let randomSize = randomRange(6, 11); 

                waterParticles.push([
                    chopperX + chopperWidth / 2 + offsetX, 
                    chopperY + chopperHeight, 
                    scatterVx, 
                    scatterVy, 
                    randomZ, 
                    randomSize, 
                    0 
                ]);
            }
        }

        // --- 🌲 배경용 일반 나무 그리기 ---
        normalTrees.forEach(tree => {
            tree[1] += SCROLL_SPEED;
            let tX = tree[0]; let tY = tree[1];
            ctx.fillStyle = "rgba(10, 25, 10, 0.35)";
            ctx.beginPath(); ctx.arc(tX + 12, tY + 16, 22, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#1B5E20"; 
            ctx.beginPath(); ctx.arc(tX, tY, 22, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#2E7D32"; 
            ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 19, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#4CAF50"; 
            ctx.beginPath(); ctx.arc(tX - 5, tY - 5, 12, 0, Math.PI * 2); ctx.fill();

            if (tree[1] > SCREEN_HEIGHT + 40) {
                tree[0] = randomRange(20, SCREEN_WIDTH - 20);
                tree[1] = randomRange(-100, -40);
            }
        });

        // --- 🔥 불타는 나무 업데이트 ---
        burningTrees.forEach(tree => {
            tree[1] += SCROLL_SPEED;
            let tX = tree[0]; let tY = tree[1]; let tState = tree[2]; 

            ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
            ctx.beginPath(); ctx.arc(tX + 10, tY + 14, 20, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#1A1A1A"; 
            ctx.beginPath(); ctx.arc(tX, tY, 20, 0, Math.PI * 2); ctx.fill();

            if (tState === "EXTINGUISHED") {
                ctx.fillStyle = "rgba(100, 100, 100, 0.6)"; 
                ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 12, 0, Math.PI * 2); ctx.fill();
            }

            if (tState === "BURNING") {
                let pulse1 = Math.sin(Date.now() / 90) * 3;
                let pulse2 = Math.cos(Date.now() / 70) * 2;
                ctx.fillStyle = "#FF3D00";
                ctx.beginPath(); ctx.arc(tX + pulse1, tY + pulse2, 19 + pulse1, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#FF9100";
                ctx.beginPath(); ctx.arc(tX - 2, tY - 2, 13 + pulse2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#FFEA00";
                ctx.beginPath(); ctx.arc(tX - 4, tY - 4, 7 + pulse1, 0, Math.PI * 2); ctx.fill();
            }

            waterParticles.forEach(p => {
                if (p[6] === 1 && tState === "BURNING") {
                    let dist = Math.sqrt(Math.pow(tX - p[0], 2) + Math.pow(tY - p[1], 2));
                    if (dist < (20 + p[5])) {
                        score += 10;
                        tree[2] = "EXTINGUISHED"; 
                    }
                }
            });

            if (tree[1] > SCREEN_HEIGHT + 30) {
                tree[0] = randomRange(50, SCREEN_WIDTH - 50);
                tree[1] = randomRange(-200, -50);
                tree[2] = "BURNING"; 
            }
        });

        // --- 🧍 시민 업데이트 ---
        citizens.forEach(person => {
            person[1] += SCROLL_SPEED;
            ctx.beginPath(); ctx.fillStyle = "#FFE0BD"; ctx.arc(person[0], person[1], 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#FFFF00"; ctx.fillRect(person[0] - 8, person[1] + 10, 16, 15);

            let distChopper = Math.sqrt(Math.pow((chopperX + chopperWidth / 2) - person[0], 2) + Math.pow((chopperY + chopperHeight / 2) - person[1], 2));
            if (distChopper < 40) {
                score += 50;
                person[0] = randomRange(50, SCREEN_WIDTH - 50);
                person[1] = randomRange(-300, -100);
            }

            for (let i = waterParticles.length - 1; i >= 0; i--) {
                let p = waterParticles[i];
                if (p[6] === 1) {
                    let distP = Math.sqrt(Math.pow(p[0] - person[0], 2) + Math.pow(p[1] - person[1], 2));
                    if (distP < (15 + p[5])) {
                        score -= 20;
                        waterParticles.splice(i, 1);
                        break;
                    }
                }
            }

            if (person[1] > SCREEN_HEIGHT + 30) {
                person[0] = randomRange(50, SCREEN_WIDTH - 50);
                person[1] = randomRange(-300, -100);
            }
        });

        // --- 🌊 물포탄 업데이트 및 그리기 ---
        for (let i = waterParticles.length - 1; i >= 0; i--) {
            let p = waterParticles[i];
            if (p[6] === 0) { 
                p[0] += p[2];
                p[1] += p[3] + SCROLL_SPEED;
                p[4] -= 4;

                let currentSize = p[5] * (1.0 + p[4] / 40.0);
                ctx.beginPath();
                ctx.fillStyle = "#00BFFF";
                ctx.arc(p[0], p[1], currentSize, 0, Math.PI * 2);
                ctx.fill();

                if (p[4] <= 0) {
                    p[6] = 1; 
                    p[5] = randomRange(12, 16); 
                }
            } else if (p[6] === 1) { 
                p[1] += SCROLL_SPEED;
                p[5] -= 1.8; 
                if (p[5] <= 0 || p[1] > SCREEN_HEIGHT) {
                    waterParticles.splice(i, 1);
                    continue;
                }
                ctx.beginPath();
                ctx.strokeStyle = "#1E90FF";
                ctx.lineWidth = 3.5; 
                ctx.arc(p[0], p[1], p[5], 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- 🚁 플레이어 헬기 그리기 ---
        let cX = chopperX + chopperWidth / 2;
        let cY = chopperY + chopperHeight / 2;

        ctx.beginPath(); ctx.fillStyle = "rgba(0, 0, 0, 0.25)"; ctx.ellipse(cX + 20, cY + 30, 18, 28, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(cX + 16, cY + 55, 8, 35); ctx.fillRect(cX + 6, cY + 85, 20, 5);
        ctx.fillStyle = "#D32F2F"; ctx.fillRect(cX - 4, cY, 8, 55); ctx.fillRect(cX - 12, cY + 50, 24, 6);
        ctx.fillStyle = "#FFFFFF"; ctx.fillRect(cX - 30, cY - 8, 8, 24); ctx.fillRect(cX + 22, cY - 8, 8, 24);
        ctx.fillStyle = "#757575"; ctx.fillRect(cX - 22, cY, 44, 4);
        ctx.beginPath(); ctx.fillStyle = "#FF1744"; ctx.ellipse(cX, cY, 20, 30, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.fillStyle = "rgba(128, 222, 234, 0.85)"; ctx.ellipse(cX, cY - 14, 13, 10, 0, 0, Math.PI * 2); ctx.fill();

        ctx.save();
        ctx.translate(cX, cY - 5); 
        let rotorAngle = (Date.now() / 40) % (Math.PI * 2);
        ctx.rotate(rotorAngle);
        ctx.strokeStyle = "rgba(230, 230, 230, 0.75)"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-55, 0); ctx.lineTo(55, 0); ctx.moveTo(0, -55); ctx.lineTo(0, 55); ctx.stroke();
        ctx.restore();
    }

    // ------------------ 3) 게임 오버 화면 ------------------
    else if (gameState === "GAMEOVER") {
        ctx.fillStyle = "#281414";
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

        ctx.fillStyle = "#ff6464";
        ctx.font = "bold 38px 'Malgun Gothic'";
        ctx.textAlign = "center";
        ctx.fillText("🚨 작전 종료 (GAME OVER) 🚨", SCREEN_WIDTH / 2, 240);

        ctx.fillStyle = "#ffffff";
        ctx.font = "24px 'Malgun Gothic'";
        ctx.fillText(`최종 소방 작전 점수: ${score} 점`, SCREEN_WIDTH / 2, 320);

        ctx.fillStyle = "#cccccc";
        ctx.font = "18px 'Malgun Gothic'";
        ctx.fillText("처음으로 돌아가려면 키보드 [ R ] 키를 누르세요.", SCREEN_WIDTH / 2, 400);
    }
}

// ⏱️ 30 FPS 고정 타이머 실행 루프
let fps = 30;
let now;
let then = Date.now();
let interval = 1000 / fps;
let delta;

function gameLoop() {
    requestAnimationFrame(gameLoop);
    now = Date.now();
    delta = now - then;
    if (delta > interval) {
        then = now - (delta % interval);
        updateAndRender();
    }
}

gameLoop();
</script>

</body>
</html>
